name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Opt into Node.js 24 for GitHub Actions (Node.js 20 deprecated Sept 2026)
  # Ref: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check (no features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  miri:
    name: Miri (memory safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Setup Miri
        run: cargo miri setup
      - name: Run Miri tests (non-libcrux modules)
        run: |
          # Only test modules that don't depend on libcrux (which uses cpuid
          # inline assembly unsupported by Miri). These modules use pure
          # SHAKE256 / GF(2^8) arithmetic and are fully Miri-compatible.
          cargo miri test --lib common::
          cargo miri test --lib chain::
          cargo miri test --lib shamir::
          cargo miri test --lib keccak_ct::
          cargo miri test --lib storage::
          cargo miri test --lib execution::
          cargo miri test --lib relations::hash_preimage::
          cargo miri test --lib relations::pedersen::
          cargo miri test --lib relations::range_proof::
          cargo miri test --lib relations::merkle::
          cargo miri test --lib layers::l0_memlock::
          cargo miri test --lib layers::l6_zeroise::
          cargo miri test --lib entropy_sources::
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        # -Zmiri-disable-isolation: needed for getrandom (OS entropy calls)
        # Modules skipped: pipeline, blind, hybrid, threshold, commit_reveal,
        # interface, l2_keygen, l3_commit, l4_prove, l5_verify, relations::ml_dsa,
        # pq_backends (all use libcrux cpuid which Miri cannot emulate).

  cargo-vet:
    name: cargo-vet (dependency audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: Initialize vet supply chain policy
        run: |
          # Initialize supply-chain policy if not already present
          if [ ! -f supply-chain/audits.toml ]; then
            cargo vet init
          fi
      - name: Vet dependencies
        run: cargo vet --locked
        continue-on-error: true
        # continue-on-error: cargo-vet may flag unaudited deps on first run.
        # Initial audit entries will be added in a follow-up commit.
