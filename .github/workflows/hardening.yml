name: Hardening

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Opt into Node.js 24 for GitHub Actions (Node.js 20 deprecated Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hardening:
    name: Source and binary hardening guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run hardening guard suite
        run: bash scripts/check-hardening.sh

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit dependency advisories
        run: cargo audit --deny warnings --ignore RUSTSEC-2026-0173
        # RUSTSEC-2026-0173: proc-macro-error2 unmaintained
        # Transitive dep of libcrux (hax-lib-macros → proc-macro-error2).
        # Compile-time proc-macro only, no runtime impact. Cannot be resolved
        # until libcrux upstream updates hax-lib dependency.

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate SBOM
        run: bash scripts/generate-sbom.sh sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
