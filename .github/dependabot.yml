# Dependabot configuration for veil7
# Monitors dependency updates for security and version bumps.
# Ref: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Rust/Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    # Group minor/patch updates to reduce PR noise
    groups:
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Ignore breaking major versions that conflict with libcrux dependencies
    ignore:
      - dependency-name: "sha3"
        update-types: ["version-update:semver-major"]
      - dependency-name: "getrandom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
